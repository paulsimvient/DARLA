scenario_id: uas-maritime-cyber-comms-only-v001
seed: 42
tick_seconds: 1.0
max_ticks: 5000

mission:
  objective: detect_and_track_red_maritime_target
  success_conditions:
    - target_detected_before_tick: 1800
    - track_confidence_min: 0.70
    - engagement_authority_available: true

entities:
  - id: blue_commander
    kind: Commander
    side: Blue
    components:
      kinematic:
        lat: 24.90
        lon: 121.50
        alt: 0

  - id: blue_uas_1
    kind: Platform
    side: Blue
    components:
      kinematic:
        lat: 25.0
        lon: 122.0
        alt: 5000
      sensor:
        confidence: 0.88
        range_km: 120
        latency_sec: 2.0

  - id: blue_relay_1
    kind: NetworkNode
    side: Blue
    components:
      kinematic:
        lat: 25.05
        lon: 122.05
        alt: 0
      comms:
        bandwidth_mbps: 10
        latency_sec: 1.0
        packet_loss: 0.01

  - id: blue_cyber_defense
    kind: CyberService
    side: Blue
    components:
      kinematic:
        lat: 24.95
        lon: 121.55
        alt: 0
      cyber:
        integrity: 0.90

  - id: red_cyber_actor
    kind: CyberService
    side: Red
    components:
      kinematic:
        lat: 25.50
        lon: 123.00
        alt: 0
      cyber:
        integrity: 0.95

  - id: red_maritime_target
    kind: Platform
    side: Red
    components:
      kinematic:
        lat: 25.7
        lon: 122.8
        alt: 0

  - id: logistics_support_node
    kind: LogisticsNode
    side: Blue
    components:
      kinematic:
        lat: 24.85
        lon: 121.45
        alt: 0

scripted_events:
  - tick: 720
    actor: red_cyber_actor
    action: degrade_comms_only
    target: blue_relay_1

relationships:
  - type: commands
    source: blue_commander
    target: blue_uas_1
  - type: communicates_with
    source: blue_commander
    target: blue_relay_1
    component: comms
  - type: depends_on
    source: blue_uas_1
    target: blue_relay_1
    component: comms
  - type: senses
    source: blue_uas_1
    target: red_maritime_target
    component: sensor
  - type: degrades
    source: red_cyber_actor
    target: blue_uas_1
    component: sensor
  - type: supports
    source: blue_relay_1
    target: blue_commander
    component: comms
  - type: supports
    source: blue_relay_1
    target: blue_uas_1
    component: comms
  - type: supplies
    source: logistics_support_node
    target: blue_commander
